<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../stylesheet/nav-bar.css" />
    <link rel="stylesheet" href="../stylesheet/left-container.css" />
    <link rel="stylesheet" href="success-form.css" />
    <link rel="stylesheet" href="../validate.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <title>Northwind Login</title>
  </head>
  <body>
    <div id="navbar"></div>

    <div>
      <div id="container__left">
        
      </div>

      <div>
        <form id="container__form" novalidate>
          <h1>Welcome back</h1>
          <p>
            Sign in to continue to your workspace.
          </p>
          <div>
            <button>
              <img src="../assets/google-icon.svg" alt="" />Continue with Google
            </button>
            <button>
              <img src="../assets/github-icon.svg" alt="" />Continue with GitHub
            </button>
          </div>
          <div><img src="../assets/divider.svg" alt="" /></div>
          <div id="email-group">
            <label for="email">Email</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="you@company.com"
              required
            />
          </div>

          <div id="password-group">
            <label for="password">Password</label>
            <div>
              <input
                type="password"
                id="password"
                name="password"
                placeholder="Enter your password"
                required
              />
              <button
                type="button"
                id="togglePassword"
              >
                <svg
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  width="20"
                  height="20"
                >
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
              </button>
            </div>
          </div>

          <div>
            <label>
              <input
                type="checkbox"
                id="remember"
              />
              <span>Remember me</span>
            </label>
            <a href="#">Forgot password?</a>
          </div>

          <button type="submit">Sign in</button>
          <p>
            Don't have an account?
            <a>Sign up</a>
          </p>
        </form>
      </div>
    </div>
    <script src="../js/form-validation.js"></script>
    <script type="module" src="../js/main.js"></script>
  </body>
</html>
