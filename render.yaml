services:
  # Backend Service
  - type: web
    name: haibazo-backend
    runtime: docker
    rootDir: backend
    plan: free
    envVars:
      - key: SPRING_DATASOURCE_URL
        value: jdbc:postgresql://aws-1-ap-southeast-1.pooler.supabase.com:5432/postgres
      - key: SPRING_DATASOURCE_USERNAME
        value: postgres.qufrlaajxqfebtvgdnaj
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false # Render sẽ yêu cầu bạn nhập mật khẩu này trên giao diện để bảo mật
      - key: PORT
        value: 8080

  # Frontend Static Site
  - type: web
    name: haibazo-frontend
    runtime: static
    rootDir: frontend
    plan: free
    buildCommand: npm install && npm run build
    publishDir: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: haibazo-backend
          type: web
          property: host
        # Hậu tố /api sẽ được xử lý trong axios.js hoặc bạn có thể nối chuỗi ở đây
